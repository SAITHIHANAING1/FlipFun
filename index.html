<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FlipFun — turn any photo into split-flap pixel art. Inspired by Flap Pix at Changi Airport, Singapore." />
    <meta name="theme-color" content="#101114" />
    <meta property="og:title" content="FlipFun" />
    <meta property="og:description" content="Turn any photo into split-flap pixel art — inspired by Flap Pix at Changi Airport." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%232a2723'/><rect x='3' y='3' width='11' height='11' rx='1' fill='%23f0ead8'/><rect x='18' y='3' width='11' height='11' rx='1' fill='%231a1210'/><rect x='3' y='18' width='11' height='11' rx='1' fill='%231a1210'/><rect x='18' y='18' width='11' height='11' rx='1' fill='%23f0ead8'/></svg>" />
    <title>FlipFun</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">A monochrome artwork</p>
        <h1>FlipFun</h1>
        <p class="intro">
          A simple camera-capture board that turns one photo into black-and-white pixel art.
        </p>
      </section>

      <section class="panel">
        <div class="actions">
          <button id="startButton" type="button">Capture camera photo</button>
          <button id="uploadButton" type="button" class="secondary">Upload photo</button>
          <button id="stopButton" type="button" class="secondary">Stop camera</button>
        </div>

        <input id="uploadInput" class="upload-input" type="file" accept="image/*" />

        <p id="statusText" class="panel-note">Camera is off. Capture one photo to turn it into black and white pixel art.</p>
      </section>

      <section class="board-shell" aria-label="Pixel art board">
        <video id="cameraPreview" class="camera-preview" playsinline autoplay muted></video>
        <div id="board" class="board" role="grid" aria-live="polite"></div>
      </section>

      <div id="captureModal" class="capture-modal" aria-hidden="true">
        <div class="capture-modal__backdrop"></div>
        <div class="capture-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="captureTitle">
          <h2 id="captureTitle">Captured photo</h2>
          <canvas id="captureCanvas" class="capture-modal__canvas"></canvas>
          <div class="capture-modal__actions">
            <button id="proceedButton" type="button">Proceed</button>
            <button id="retakeButton" type="button" class="secondary">Retake</button>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
